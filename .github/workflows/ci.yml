name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
          BETTER_AUTH_SECRET: ci-only-placeholder-secret-at-least-32-bytes
          BETTER_AUTH_URL: http://localhost:3000
          IP_HASH_SECRET: ci-only-placeholder-ip-secret-32-bytes
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_PROTOMAPS_API_KEY: ci-build-placeholder
