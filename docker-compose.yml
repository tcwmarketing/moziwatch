services:
  db:
    image: postgis/postgis:16-3.5
    environment:
      POSTGRES_DB: moziwatch
      POSTGRES_USER: moziwatch
      POSTGRES_PASSWORD: moziwatch
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moziwatch -d moziwatch"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - moziwatch-postgres:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:v1.27
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  moziwatch-postgres:
